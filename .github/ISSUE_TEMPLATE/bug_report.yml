name: Bug report
description: Report something that doesn't work as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      content: |
        Thanks for taking the time to report a bug. Please fill in the template below so we can reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      placeholder: A clear one-line description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. `agentmux ...`
        2. `agentmux ...`
        3. See error.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: agentmux version (`agentmux --version`)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: input
    id: rust
    attributes:
      label: Rust version (`rustc --version`)
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Relevant `.agentmux.toml` or `~/.config/agentmux/config.toml` (sanitized)
      render: shell
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (`agentmux logs <name> --tail 100`)
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
    validations:
      required: false